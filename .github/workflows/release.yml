name: Create reproducible release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require tag to belong to master
        shell: bash
        run: |
          git fetch --no-tags origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22
          cache: npm

      - name: Setup Java for Firebase Emulator
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Validate release source
        run: npm run ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate browser flows
        run: npm run test:e2e

      - name: Package immutable artifact
        shell: bash
        run: |
          tar -C dist -czf "dias-trabalhados-${GITHUB_REF_NAME}.tar.gz" .
          sha256sum "dias-trabalhados-${GITHUB_REF_NAME}.tar.gz" > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          "dias-trabalhados-${{ github.ref_name }}.tar.gz"
          SHA256SUMS.txt
          --repo "${{ github.repository }}"
          --verify-tag
          --generate-notes
          --title "${{ github.ref_name }}"
