version: 2
updates:
  - package-ecosystem: npm
    directory: /
    target-branch: master
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    target-branch: master
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      workflow-actions:
        patterns:
          - "*"
